<!DOCTYPE html PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1">
<html xmlns="http://www.w3.org/2000/svg" width="512" height="512">
<head>
<title>Dashboardium App Icon</title>
<meta name="generator" content="Hermes Agent"/>
</head>
<style>
  .bg { fill: #1a1a2e; }
  .glow-main { filter: drop-shadow(0 0 12px rgba(78, 204, 163, 0.5)); animation: none;}
  .dot-lg { fill: #4ecca3; opacity: 1; shape-rendering: geometricPrecision; }
  .line-strong { stroke: #4ecca3; stroke-width: 3; opacity: 0.85; fill: none; stroke-linecap: round; }
  .bg-card { fill: #252540; }
</style>
<body>
  <!-- Icon-512.svg - Large PWA icon for mobile devices and high DPI displays -->
  
  <circle class="bg" cx="256" cy="256" r="252"/>
  
  <!-- Multi-layered glow effect mint green -->
  <g>
    <circle class="glow-main bg-card" cx="256" cy="256" r="235"/><text style="opacity:0; visibility:hidden">layer1</text>
    <circle class="glow-main bg-card" cx="256" cy="256" r="218" style="fill-opacity: 0.95; stroke-width: 0"/>
  </g>
  
  <!-- Main agent constellation (7 nodes for comprehensive monitoring) -->
  <svg width="512" height="512">
    <defs>
      <radialGradient id="agentGlow" cx="30%" cy="30%">
        <stop offset="0%" style="stop-color:#4ecca3;stop-opacity:1"/>
        <stop offset="90%" style="stop-color:#2a5a4c;stop-opacity:0.7"/>  
      </radialGradient>
    </defs>
    
    <!-- Network of AI agents (monitoring nodes) -->
    <g id="agents">
      <circle cx="180" cy="165" r="32" class="dot-lg"/><title>Agent Zone 7</title>
      <circle cx="332" cy="165" r="32" class="dot-lg"/><!-- right edge monitor -->
      <circle cx="256" cy="140" r="38" fill="url(#agentGlow)" class="glow-main bg-card"/><!-- top primary agent (ACTIVE/LEADER) - largest, glowing -->
      
      <!-- Secondary monitoring nodes -->
      <circle cx="195" cy="256" r="30" opacity="0.85"/><title>Agent Zone 4</title>
      <circle cx="317" cy="256" r="30" opacity="0.88"/><!-- right side agent -->
      <circle cx="170" cy="300" r="25" opacity="0.75" class="dot-lg" fill-opacity: 0.6/><!-- bottom-left processing node -->
      <circle cx="342" cy="300" r="24" opacity="0.8"/><!-- bottom-right analytical agent -->
      
      <!-- Central orchestrator (largest, most prominent) -->
      <circle cx="256" cy="256" r="20" class="dot-lg glow-main"/>
    </g>
  </svg>
  
  <!-- Connection network lines (live activity/real-time monitoring arcs) -->
  <svg width="512" height="512">
    <defs><linearGradient id="lineGrid" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" style="stop-color:#4ecca3;stop-opacity:0.7"/><stop offset="80%" style="stop-color:#4ecca3;stop-opacity:0.9"/></linearGradient></defs>
    <g stroke="url(#lineGrid)" class="line-strong">
      <!-- Horizontal communication bus -->
      <path d="M180 165 L256 215 M256 140 L332 190"/>  
      <!-- Cross-flow connections (agent coordination arcs) -->
      <path d="M195 256 L317 256 M195 230 L280 185 M317 265 L240 202"/>  
      <!-- Diagonal sync lines (real-time WebSocket) -->
      <path d="M256 140 L214 192" opacity="0.7"/><title>Leader to zone sync</title>
    </g>
  </svg>
  
  <!-- Pulsing activity rings (live monitoring indicator - work in progress) -->
  <circle class="glow-main bg-card" cx="256" cy="256" r="104" style="opacity: 0.1; stroke-width: 3px; fill: none"/>
  <circle class="bg-card" cx="256" cy="256" r="78" style="opacity: 0.07; stroke-width: 2px; fill: none"/>
  
  <!-- Dashboard grid hint (subtle) -->
  <g opacity="0.08">
    <line x1="192" y1="200" x2="320" y2="200" stroke="#4ecca3" stroke-width="3" class="line-strong"/>  
    <line x1="256" y1="152" x2="256" y2="280" stroke="#4ecca3" stroke-width="2.5" opacity="0.4"/>
  </g>
  
  <!-- Primary activity indicators (status) -->
  <g>
    <rect x="250" y="471" width="13" height="9" fill="#4ecca3" rx="6"/><!-- active indicator -->
    <rect x="499" y="461" width="13" height="8.5" fill="#4ecca3" opacity="0.9"/>
  </g>
  
  SVG
</body>
</html>
