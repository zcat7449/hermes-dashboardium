<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboardium — Hermes Profiles</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --text: #e0e0e0;
  --accent: #0f3460;
  --green: #4ecca3;
  --yellow: #e8c547;
  --gray: #6c757d;
  --red: #e74c3c;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 4px 16px rgba(0,0,0,0.35);
  --radius: 10px;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", Menlo, Consolas, "Courier New", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.4;
  height: 100vh;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: rgba(15,52,96,0.25);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  backdrop-filter: blur(8px);
  z-index: 10;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
header h1 .dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 8px;
  box-shadow: 0 0 8px var(--green);
}
header .conn {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: rgba(224,224,224,0.7);
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(0,0,0,0.2);
}
header .conn .pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.4s ease-in-out infinite;
}
header .conn.demo .pulse { background: var(--yellow); animation: none; }
header .conn.error .pulse { background: var(--red); animation: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.4); }
}
main {
  padding: 12px 24px 8px;
  max-width: 100%;
  width: 100%;
  margin: 0 auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.section {
  /* не фиксированный margin-bottom */
  overflow: hidden;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.section:first-of-type {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.section:last-of-type {
  flex: 0 0 auto;
  overflow-y: auto;
  max-height: 50%;
}
.section h2 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(224,224,224,0.55);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.section h2 .count {
  background: var(--accent);
  color: var(--text);
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  letter-spacing: 0.5px;
}
/* Add leader button + dropdown */
.add-leader-wrapper {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.add-leader-btn {
  background: var(--green);
  color: #0a0a14;
  border: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background 0.15s;
}
.add-leader-btn:hover { background: #6ee0b8; }
.add-leader-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 4px;
  background: #1e2a4a;
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  z-index: 100;
  min-width: 180px;
  max-height: 200px;
  overflow-y: auto;
}
.add-leader-dropdown.open { display: block; }
.add-leader-dropdown .dd-item {
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
  text-transform: lowercase;
  transition: background 0.1s;
}
.add-leader-dropdown .dd-item:hover { background: rgba(78,204,163,0.15); }
.add-leader-dropdown .dd-empty {
  padding: 8px 12px;
  font-size: 11px;
  color: rgba(224,224,224,0.4);
  font-style: italic;
}
/* Remove leader button on top cards */
.remove-leader-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(231,76,60,0.2);
  color: var(--red);
  border: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s;
  line-height: 1;
  z-index: 5;
}
.card:hover .remove-leader-btn { opacity: 0.6; }
.remove-leader-btn:hover { opacity: 1 !important; background: rgba(231,76,60,0.4); }
.top-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  flex: 1;
  min-height: 0;
}
.top-grid .card {
  /* Растягивается на всю высоту top-grid */
  display: flex;
  flex-direction: column;
  min-height: 0;
  gap: 4px;
  padding: 8px 10px;
}
.top-grid .card .head .name {
  font-size: 13px;
}
.top-grid .card .model {
  font-size: 9px;
  line-height: 1.2;
}
.top-grid .card .task {
  padding: 3px 6px;
  font-size: 10px;
  margin: 0;
}
.top-grid .card .task .task-id {
  font-size: 8px;
  margin-bottom: 0;
}
.top-grid .card .timer {
  font-size: 13px;
  padding: 0;
  line-height: 1.2;
}
.top-grid .card .actions {
  margin-top: 0;
  gap: 4px;
}
.top-grid .card .actions .btn {
  padding: 3px 6px;
  font-size: 10px;
}
.top-grid .card .chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.top-grid .card .chat .log {
  flex: 1;
  max-height: none;
  min-height: 60px;
  overflow-y: auto;
}
.top-grid .card .chat .row {
  flex-shrink: 0;
}
.bottom-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 6px;
  flex-shrink: 0;
  overflow-y: auto;
  max-height: 100%;
}
.bottom-grid .card {
  min-height: 200px;
  padding: 8px;
  gap: 3px;
}
.bottom-grid .card .model {
  font-size: 9px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bottom-grid .card .task {
  padding: 3px 5px;
  font-size: 9px;
  border-left-width: 2px;
  margin: 0;
}
.bottom-grid .card .task .task-id {
  font-size: 8px;
}
.bottom-grid .card .timer {
  font-size: 12px;
  padding: 1px 0;
}
.bottom-grid .card .actions {
  margin-top: 0;
  gap: 4px;
}
.bottom-grid .card .actions .btn {
  padding: 3px 5px;
  font-size: 9px;
}
.bottom-grid .card .head .name {
  font-size: 12px;
}

/* Task queue */
.task-queue {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 2px;
  max-height: 80px;
  overflow-y: auto;
  flex-shrink: 0;
}
.task-queue-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  padding: 2px 4px;
  border-radius: 3px;
  background: rgba(0,0,0,0.15);
  cursor: help;
}
.task-queue-item:hover { background: rgba(255,255,255,0.06); }
.task-queue-item.active {
  background: rgba(78,204,163,0.12);
  border-left: 2px solid var(--green);
}
.tq-board {
  font-family: var(--font-mono);
  font-size: 7px;
  color: rgba(255,255,255,0.4);
  min-width: 24px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tq-id {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tq-status {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tq-status.running { background: var(--green); box-shadow: 0 0 4px var(--green); }
.tq-status.blocked { background: var(--yellow); }
.tq-status.ready { background: #4fc3f7; }
.tq-status.todo { background: var(--gray); }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 8px;
  /* min-height задаётся через top-grid .card или bottom-grid .card */
  position: relative;
  transition: transform 0.15s ease, border-color 0.15s ease;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-2px);
  border-color: rgba(78,204,163,0.4);
}
.card.empty-slot {
  border: 1px dashed rgba(255,255,255,0.18);
  background: rgba(22,33,62,0.4);
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: default;
}
.card.empty-slot:hover { transform: none; }
.assign-btn {
  background: var(--accent);
  color: var(--text);
  border: none;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-ui);
}
.assign-btn:hover { background: #3a7fd5; }
.card .head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.card .name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  text-transform: lowercase;
}
.card .status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.card .status-dot.running { background: var(--green); color: var(--green); }
.card .status-dot.blocked { background: var(--yellow); color: var(--yellow); }
.card .status-dot.idle    { background: var(--gray);   color: var(--gray); }
.card .model {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(224,224,224,0.55);
  word-break: break-all;
}
.card .task {
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 12px;
  border-left: 3px solid var(--accent);
}
.card .task .task-id {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(224,224,224,0.5);
  margin-bottom: 2px;
}
.card .task .task-title {
  color: var(--text);
  word-break: break-word;
}
.card .task.idle-task {
  border-left-color: var(--gray);
  color: rgba(224,224,224,0.4);
  font-style: italic;
}
.card .timer {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  padding: 4px 0;
  color: var(--green);
  letter-spacing: 1px;
}
.card .timer.idle-timer { color: var(--gray); font-size: 14px; font-weight: 400; }
.card .actions {
  display: flex; gap: 6px; margin-top: 4px;
}
.btn {
  flex: 1;
  background: var(--accent);
  color: var(--text);
  border: none;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-ui);
  transition: background 0.15s;
}
.btn:hover { background: #1450a0; }
.btn.optimize { background: rgba(78,204,163,0.18); color: var(--green); }
.btn.optimize:hover { background: rgba(78,204,163,0.3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.chat {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.chat .log {
  background: rgba(0,0,0,0.25);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 11px;
  max-height: 200px;
  min-height: 80px;
  overflow-y: auto;
  font-family: var(--font-mono);
  white-space: pre-wrap;
  word-break: break-word;
}
.chat .log .msg-you { color: var(--green); }
.chat .log .msg-bot { color: var(--text); }
.chat .log .empty { color: rgba(224,224,224,0.35); font-style: italic; }
.chat .row {
  display: flex; gap: 4px;
}
.chat input {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  border-radius: 5px;
  font-family: var(--font-ui);
  font-size: 12px;
  min-width: 0;
}
.chat input:focus { outline: 1px solid var(--green); border-color: var(--green); }
.chat button {
  background: var(--green);
  color: #0a0a14;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-ui);
}
.chat button:hover { background: #6ee0b8; }
.chat button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Sessions */
.session-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 100px;
  overflow-y: auto;
  border-bottom: 1px solid var(--border);
  padding-bottom: 4px;
  margin-bottom: 4px;
}
.session-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: background 0.1s;
}
.session-item:hover { background: rgba(255,255,255,0.06); }
.session-item.active { background: rgba(78,204,163,0.12); color: var(--green); }
.session-item .sess-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .sess-source { font-size: 8px; color: rgba(255,255,255,0.3); }
.session-item .sess-msg-count { font-size: 9px; color: rgba(255,255,255,0.4); }
.session-item button { opacity: 0.4; cursor: pointer; background: none; border: none; color: var(--text); padding: 0 2px; font-size: 11px; }
.session-item:hover button { opacity: 0.8; }
.session-item button:hover { opacity: 1; color: var(--green); }
.session-item .sess-delete:hover { color: var(--red); }
.sess-new {
  background: none;
  border: 1px dashed var(--border);
  color: rgba(255,255,255,0.5);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
  width: 100%;
  text-align: center;
  margin-top: 2px;
}
.sess-new:hover { border-color: var(--green); color: var(--green); }
.session-item.active .sess-name { color: var(--green); font-weight: 600; }
.session-item.active::before {
  content: '●';
  color: var(--green);
  font-size: 8px;
  margin-right: 2px;
}
.session-list:empty + .sess-new { margin-top: 0; }

/* Filter */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.filter-bar input {
  flex: 1;
  max-width: 400px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: var(--font-ui);
  font-size: 13px;
}
.filter-bar input:focus { outline: 1px solid var(--green); border-color: var(--green); }
.filter-bar .meta {
  font-size: 12px;
  color: rgba(224,224,224,0.5);
  margin-left: auto;
}

@media (max-width: 1199px) {
  .bottom-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 900px) {
  .top-grid { grid-template-columns: repeat(2, 1fr); }
  .bottom-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 768px) {
  .bottom-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 560px) {
  .top-grid { grid-template-columns: 1fr; }
  .bottom-grid { grid-template-columns: 1fr; }
  main { padding: 8px 12px 4px; }
  header { padding: 8px 12px; }
  .section h2 { margin-bottom: 6px; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
  header .conn .pulse { animation: none; }
}
:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

/* Drag handle */
.drag-handle {
  position: absolute;
  top: 4px;
  left: 4px;
  font-size: 12px;
  color: rgba(224,224,224,0.25);
  cursor: grab;
  z-index: 5;
  line-height: 1;
  padding: 2px;
  user-select: none;
  transition: color 0.15s;
}
.drag-handle:hover { color: rgba(224,224,224,0.7); }
.card.dragging {
  opacity: 0.4;
  transform: scale(0.95);
  border-color: var(--green);
}
.card.drag-over {
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(78,204,163,0.3);
  transform: translateY(-2px);
}

/* Collapse chat button */
.collapse-chat-btn {
  position: absolute;
  top: 4px;
  right: 24px;
  background: none;
  border: none;
  color: rgba(224,224,224,0.3);
  font-size: 10px;
  cursor: pointer;
  z-index: 5;
  padding: 2px 4px;
  line-height: 1;
  transition: color 0.15s;
}
.collapse-chat-btn:hover { color: var(--green); }

/* ---- Profile Modal ---- */
.profile-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: modalFadeIn 0.2s ease;
}
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.profile-modal {
  background: #1e2a4a;
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  width: 420px;
  max-width: 90vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: modalSlideIn 0.2s ease;
  overflow: hidden;
}
@keyframes modalSlideIn {
  from { transform: translateY(20px) scale(0.96); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.profile-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.profile-modal-header h3 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text);
}
.pm-counter {
  font-weight: 400;
  color: rgba(224,224,224,0.6);
}
.profile-modal-header-btns {
  display: flex;
  align-items: center;
  gap: 6px;
}
.profile-modal-close-btn {
  background: rgba(78,204,163,0.12);
  border: 1px solid rgba(78,204,163,0.25);
  color: var(--green);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-family: var(--font-ui);
  cursor: pointer;
  transition: background 0.15s;
}
.profile-modal-close-btn:hover {
  background: rgba(78,204,163,0.25);
}
.profile-modal-close {
  background: none;
  border: none;
  color: rgba(224,224,224,0.4);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.profile-modal-close:hover { color: var(--red); }
.profile-modal-search {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
}
.profile-modal-search input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: var(--font-ui);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.profile-modal-search input:focus {
  border-color: var(--green);
}
.profile-modal-search input::placeholder {
  color: rgba(224,224,224,0.35);
}
.profile-modal-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.profile-modal-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.1s;
  border-left: 3px solid transparent;
}
.profile-modal-item:hover {
  background: rgba(78,204,163,0.08);
  border-left-color: var(--green);
}
.profile-modal-item.selected {
  background: rgba(78,204,163,0.12);
  border-left-color: var(--green);
